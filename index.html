<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Combined News Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      line-height: 1.6;
      color: #333;
      padding: 0 15px;
    }
    h1 {
      text-align: center;
      color: #222;
    }
    a.feed-link {
      display: block;
      text-align: center;
      margin: 20px 0;
      padding: 10px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 6px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    a.feed-link:hover {
      background: #eaeaea;
    }
    footer {
      margin-top: 40px;
      font-size: 0.9em;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Combined News Feed</h1>
  <p>This project aggregates <strong>36 news feeds</strong> into a single RSS feed, updated every 30 minutes.</p>

  <a class="feed-link" href="combined.xml">➡ View Combined Feed (RSS)</a>

  <footer>
    Powered by GitHub Actions · Last updated automatically
  </footer>
</body>
</html>
